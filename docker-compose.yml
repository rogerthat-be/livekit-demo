services:
  # LiveKit media server
  livekit:
    image: livekit/livekit-server:latest
    container_name: livekit-server
    command: --config /etc/livekit.yaml --bind 0.0.0.0
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml
    ports:
      - "7880:7880"      # HTTP/WebSocket
      - "7881:7881/udp"  # WebRTC UDP
      - "7881:7881/tcp"  # WebRTC TCP
    restart: unless-stopped
    networks:
      - livekit-network
      - rt-proxy-network

  coturn:
    image: coturn/coturn:latest
    container_name: coturn-server
    command:
      - -n
      - --lt-cred-mech
      - --fingerprint
      - --no-multicast-peers
      - --no-cli
      - --realm=${TURN_REALM:-localhost}
      - --user=${TURN_USERNAME:-turnuser}:${TURN_PASSWORD:-turnpass}
      - --min-port=${TURN_MIN_PORT:-49160}
      - --max-port=${TURN_MAX_PORT:-49200}
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "${TURN_MIN_PORT:-49160}-${TURN_MAX_PORT:-49200}:${TURN_MIN_PORT:-49160}-${TURN_MAX_PORT:-49200}/udp"
    restart: unless-stopped
    networks:
      - livekit-network
      - rt-proxy-network

  token-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: livekit-token-server
    environment:
      - NODE_ENV=production
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:-pumbaa}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:-HAKUNA_MATATA_TIMON_PUMBAA}
      - FRONTEND_ORIGINS=${FRONTEND_ORIGINS:-}
    depends_on:
      - livekit
    restart: unless-stopped
    networks:
      - livekit-network
      - rt-proxy-network

  # Client (static frontend)
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_TOKEN_URL: ${VITE_TOKEN_URL:-/token}
        VITE_LIVEKIT_URL: ${VITE_LIVEKIT_URL:-ws://localhost:7880}
        VITE_STUN_URL: ${VITE_STUN_URL:-}
        VITE_TURN_URL: ${VITE_TURN_URL:-}
        VITE_TURN_USERNAME: ${VITE_TURN_USERNAME:-}
        VITE_TURN_PASSWORD: ${VITE_TURN_PASSWORD:-}
    container_name: livekit-client
    ports:
      - "5173:80"    # Client (HTTP)
    depends_on:
      - token-server
    restart: unless-stopped
    networks:
      - livekit-network
      - rt-proxy-network

networks:
  livekit-network:
    driver: bridge
  rt-proxy-network:
    external: true
